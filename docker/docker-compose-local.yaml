#version: "3.9"          # Supported by both podman-compose and Docker Compose v2+
name: mcp-gatewys
  

networks:
  gateways-net:               # Single user-defined bridge network keeps traffic private
    driver: bridge

###############################################################################
#  CORE SERVICE - ContextForge
###############################################################################
services:
  gateway-one:
    image: mcp_counter
    build:
      dockerfile: mcp_counter.Dockerfile

    networks: [gateways-net]
    ports: [5555:5555]

    environment:
      - RUST_LOG=warn
      - MCP_SERVER_BIND_ADDRESS=0.0.0.0:5555
      - MCP_SERVER_ALLOWED_HOSTS=127.0.0.1,9.85.219.104,192.168.1.14
            
    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    deploy:      
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}

  gateway-two:
    image: mcp_conformance
    build:
      dockerfile: mcp_conformance.Dockerfile
    networks: [gateways-net]
    ports: [5556:5556]

    environment:
      - RUST_LOG=warn
      - PORT=5556
      
    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    deploy:      
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}          


    



###############################################################################
#  CACHE
###############################################################################
  redis:
    image: redis:latest
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Performance tuning for 1000+ RPS high-concurrency load testing
    command:
      - "redis-server"
      - "--maxmemory"
      - "1gb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--tcp-backlog"
      - "2048"
      - "--timeout"
      - "0"
      - "--tcp-keepalive"
      - "300"
      - "--maxclients"
      - "10000"
      - "--port"
      - "6379"
      - "--tls-port"
      - "16379"
      - "--tls-cert-file"
      - "/tls_config/contextforge-server.cert.pem"
      - "--tls-key-file"
      - "/tls_config/contextforge-server.key.pem"
      - "--tls-auth-clients"
      - "no"
      # - "--tls-ca-cert-file"
      # - "/tls_config/contextforge.intermediate.cert.pem"
    ports:
      - "6379:6379"      # expose only if you want host access
      - "16379:16379"      # expose only if you want host access
    volumes: 
      - ../assets/contextforgeCA/:/tls_config:z
    

    networks: [gateways-net]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

